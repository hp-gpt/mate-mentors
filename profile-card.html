    <script>
        window.addEventListener('load', function () {
            const savedData = localStorage.getItem('userProfile');

            if (savedData) {
                const responsePayload = JSON.parse(savedData);

                // 1. Update Header Image
                const signinElements = document.getElementsByClassName('g_id_signin');
                if (signinElements.length > 0) {
                    signinElements[0].innerHTML = `
                    <div class="pfp">
                        <img src="${responsePayload.picture}" style="border-radius: 50%; width: 45px; height: 45px;"><br>
                        <button onclick="logout()" style="cursor: pointer; padding: 5px; position: absolute; width: 80px; top: 75px; right: 0px; font-family: DM Sans; font-weight: 700; border-style: none;">Sign Out</button>
                    </div>
                    `;
                }

                // 2. Update Confirmation Area (MOVED INSIDE HERE)
                // Using your exact variable names and structure
                document.getElementById('confirm').innerHTML = `
                    <input type="checkbox" value="${responsePayload.email}" name="Email" checked required > 
                    Confirm email: ${responsePayload.email} <br>
                    <input type="checkbox" value="${responsePayload.name}" name="Name" checked required> 
                    Confirm name: ${responsePayload.name}
                `;

            } else {
                // If NO data is found
                alert('Please sign in. You will be redirected to the home page to sign in');
                window.location.href = "index.html";
            }
        });

        function logout() {
            localStorage.removeItem('userProfile');
            location.reload();
        };
    </script>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

        <script>
            const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTq_ZFivaehEXzkN7TQ0gUo6bBPMo-9dOfk-VY7PPRpo5Sky1GHPt_nOpnkhISosR3qfpsynMQaxC75/pub?output=csv"

            fetch(SHEET_URL, { redirect: 'follow' })
                .then(r => r.text())
                .then(csv => {
                    const results = Papa.parse(csv, { header: true })
                    results.data.forEach(row => {
                        const card = document.createElement("div")
                        card.classList.add("profile-card")
                        card.innerHTML = `
                            <img src ="${row['PFP']}" style="border-radius: 50%;">
                            <h3>${row['Name']}</h3>
                            <p>Grade: ${row['StudentGrade']}</p>
                            <p>Can teach: ${row['StrongSubjects']}</p>
                            <p>Needs help with: ${row['WeakSubjects']}</p>
                        `
                        document.getElementById("cards-container").appendChild(card)
                    })
                })
        </script>
